{% extends 'main/base.html' %}
{% block title %}Reply to {{ recipient.username }} - gamify.trade{% endblock %}

{% block content %}
<div class="card">
    <h1>Reply to {{ recipient.username }}</h1>
    <p style="color: #ccc; font-size: 0.9rem; margin-top: 0.5rem;">Continue your conversation with {{ recipient.username }}.</p>

    <form method="POST" style="margin-top: 1.5rem;">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_content">Message:</label>
            <textarea id="id_content" name="content" rows="5" placeholder="Type your reply..." required></textarea>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="submit" class="gb-btn">Send Reply</button>
            <a href="{% url 'users:messages' %}">
                <button type="button" class="gb-btn">Cancel</button>
            </a>
        </div>
    </form>
</div>
{% endblock %}
