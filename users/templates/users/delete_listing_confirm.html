{% extends 'main/base.html' %}
{% load static %}

{% block title %}Delete Listing - gamify.trade{% endblock %}

{% block content %}
  <div class="card">
    <h1>Delete Listing</h1>
    <p><strong>{{ listing.title }}</strong></p>

    <p>Are you sure you want to delete this listing? This is non-recoverable.</p>

    <form method="post">
      {% csrf_token %}
      <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-top:1rem;">
        <button type="submit" class="gb-btn">Delete</button>
        <a href="{% url 'users:listing_detail' listing.pk %}"><button type="button">Cancel</button></a>
      </div>
    </form>
  </div>
{% endblock %}
